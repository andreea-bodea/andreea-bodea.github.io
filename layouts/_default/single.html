{{ define "main" }}
<article class="max-w-4xl mx-auto px-4 sm:px-6 py-16 md:py-20">
  <h1 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-6">{{ .Title }}</h1>

  {{- if .Content }}
    <div class="prose dark:prose-invert max-w-none">
      {{ .Content }}
    </div>
  {{- end }}
</article>
{{ end }}
