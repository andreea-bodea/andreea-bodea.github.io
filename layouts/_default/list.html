{{ define "main" }}
<div class="max-w-5xl mx-auto px-4 sm:px-6 py-16 md:py-20">
  <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-8">{{ .Title }}</h1>

  {{- if .Content }}
    <div class="prose dark:prose-invert max-w-none mb-8">
      {{ .Content }}
    </div>
  {{- end }}

  <div class="space-y-4">
    {{- range .Pages }}
      <article>
        <h2 class="text-xl font-semibold">
          <a href="{{ .Permalink }}" class="text-gray-900 dark:text-white hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
            {{ .Title }}
          </a>
        </h2>
        {{- if .Params.summary }}
          <p class="mt-1 text-sm text-gray-600 dark:text-gray-400">{{ .Params.summary }}</p>
        {{- end }}
      </article>
    {{- end }}
  </div>
</div>
{{ end }}
