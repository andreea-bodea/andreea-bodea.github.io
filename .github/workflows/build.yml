name: Build

env:
  NODE_VERSION: '20'
  HUGO_VERSION: '0.156.0'

on:
  pull_request:
    branches: ['main']
  workflow_call:
    outputs:
      artifact-id:
        description: 'The ID of the uploaded artifact'
        value: ${{ jobs.build.outputs.artifact-id }}
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup pnpm
      if: hashFiles('package.json') != ''
      uses: pnpm/action-setup@v4

    - name: Install dependencies
      run: |
        if [ -f "package.json" ]; then
          pnpm install --no-frozen-lockfile || npm install
        fi

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: ${{ env.HUGO_VERSION }}
        extended: true

    - uses: actions/cache@v4
      with:
        path: |
          /tmp/hugo_cache_runner/
          node_modules/
        key: ${{ runner.os }}-hugo-deps-${{ hashFiles('**/package-lock.json', '**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-hugo-deps-

    - uses: actions/cache@v4
      with:
        path: resources/
        key: ${{ runner.os }}-hugo-resources-${{ hashFiles('assets/**/*', 'config/**/*', 'package.json') }}
        restore-keys: |
          ${{ runner.os }}-hugo-resources-

    - name: Build with Hugo
      env:
        HUGO_ENVIRONMENT: production
      run: |
        echo "Hugo Cache Dir: $(hugo config | grep cachedir)"
        hugo --minify

    - name: Generate Pagefind search index
      run: |
        if [ -f "package.json" ] && grep -q "pagefind" package.json; then
          pnpm run pagefind || npx pagefind --site "public"
        fi

    - name: Upload artifact
      id: upload
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./public
